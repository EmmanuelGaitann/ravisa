name: Deploy to o2switch (Incrémental)

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    name: FTP Deploy (Incrémental)
    runs-on: ubuntu-latest

    steps:
      # 1. CLONER LE CODE AVEC HISTORIQUE
      - name: Checkout latest code (with history for incremental deploy)
        uses: actions/checkout@v3
        with:
          # IMPORTANT : Télécharge les 10 derniers commits pour comparaison
          fetch-depth: 10

      # 2. CONFIGURATION DE PHP ET COMPOSER (pour CodeIgniter)
      - name: Setup PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          # Ajustez la version de PHP si nécessaire (ex: '7.4', '8.0', '8.2')
          php-version: '8.2'
          tools: composer

      - name: Install Dependencies (composer install)
        # Ceci crée le dossier 'vendor/' essentiel avant le déploiement
        run: composer install --prefer-dist --no-progress --no-dev

      # 3. DÉPLOIEMENT FTP (sera incrémental à partir du 2e déploiement)
      - name: FTP Deploy to o2switch server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          # local-dir: ./ inclut le dossier vendor/ maintenant complet
          local-dir: ./
          # Utilisation du chemin distant que vous avez validé :
          server-dir: ${{ secrets.FTP_PATH }}

          # Liste d'exclusion (reste inchangée)
          exclude: |
            **/.git*
            **/.github*
            **/node_modules*
            **/.env
            **/writable/cache/*